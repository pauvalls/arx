name: "Arx Architecture Audit"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  architecture-audit:
    name: "Architecture Audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for GitHub Code Scanning (SARIF upload)

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: "Run arx architecture audit"
        id: arx
        uses: ./.github/actions/arx-action
        with:
          path: "."
          config: "arx.yaml"
          format: "sarif"
          # Uncomment to suppress known violations with a baseline:
          # baseline: ".arx-baseline.json"
          # Uncomment to generate an architecture diagram artifact:
          # diagram: "true"

      - name: "Upload SARIF to GitHub Code Scanning"
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}/arx-audit.sarif
          category: "arx-architecture-audit"

      - name: "Upload architecture diagram"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arx-architecture-diagram
          path: arx-architecture.mmd
          if-no-files-found: ignore
          retention-days: 7
