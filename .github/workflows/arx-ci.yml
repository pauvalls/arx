name: "Arx CI"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: "Quality Gates"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: "Check Go version"
        run: go version

      - name: "Vet"
        run: go vet ./...

      - name: "Race detector (hard fail)"
        run: go test -count=5 -race ./...

      - name: "Coverage check (core >50%)"
        run: |
          go test -cover -count=1 ./internal/... 2>&1 | tee /tmp/coverage.txt
          # Ensure all core packages have >50% coverage
          ! grep -E "coverage: [0-4][0-9]" /tmp/coverage.txt | grep -v "^?"

      - name: "WASM size limit validation"
        run: |
          go test -count=1 -run TestNewEvaluator_OversizedModule ./internal/infrastructure/wasm/

  benchmark-regression:
    name: "Benchmark Regression"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: "Install benchstat"
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: "Run benchmarks"
        run: go test -bench=/Detection -benchmem -count=5 ./internal/application/ | tee /tmp/bench.pr

      - name: "Compare with baseline (warn on >10% regression on 10k)"
        run: |
          benchstat .bench-baseline /tmp/bench.pr 2>&1 || true
          echo "---"
          benchstat .bench-baseline /tmp/bench.pr 2>&1 | grep "DetectionPipeline_10k" | awk '{
            if ($$3 ~ /[0-9]+%/) {
              gsub(/%/, "", $$3);
              if ($$3+0 > 10) {
                print "⚠️  REGRESSION: DetectionPipeline_10k " $$3 " slower than baseline";
                exit 1
              }
            }
          }' && echo "✓ No significant regression detected" || echo "⚠️  Regression check completed (baseline comparison is informational)"

  architecture-audit:
    name: "Architecture Audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for GitHub Code Scanning (SARIF upload)

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: "Run arx architecture audit"
        id: arx
        uses: ./.github/actions/arx-action
        with:
          path: "."
          config: "arx.yaml"
          format: "sarif"
          # Uncomment to suppress known violations with a baseline:
          # baseline: ".arx-baseline.json"
          # Uncomment to generate an architecture diagram artifact:
          # diagram: "true"

      - name: "Upload SARIF to GitHub Code Scanning"
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}/arx-audit.sarif
          category: "arx-architecture-audit"

      - name: "Upload architecture diagram"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arx-architecture-diagram
          path: arx-architecture.mmd
          if-no-files-found: ignore
          retention-days: 7
