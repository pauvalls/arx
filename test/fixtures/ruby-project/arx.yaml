version: "1.0"
layers:
  - name: domain
    paths:
      - "**/lib/domain/**"
  - name: application
    paths:
      - "**/lib/application/**"
  - name: infrastructure
    paths:
      - "**/lib/infrastructure/**"
rules:
  - id: domain-no-import-other
    from: domain
    to:
      - application
      - infrastructure
    type: Cannot
    severity: error
    explanation: Domain must not depend on other layers
  - id: application-no-import-infrastructure
    from: application
    to:
      - infrastructure
    type: Cannot
    severity: error
    explanation: Application should depend on interfaces, not implementations
